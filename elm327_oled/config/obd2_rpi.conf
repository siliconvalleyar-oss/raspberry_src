# OBD2 RPi Configuration
# Edit this file to match your setup

# Bluetooth
bt_mac = 00:1D:A5:07:23:6E
bt_channel = 1
bt_timeout = 30

# SPI OLED
spi_device = /dev/spidev0.0
spi_speed = 8000000
gpio_chip = 0
pin_dc = 25
pin_rst = 17

# Timing (ms)
obd_poll_ms = 800
display_ms = 400

# Display
auto_rotate = true
rotate_interval = 6

# Features
enable_gm = true
log_dir = /home/pi/obd2_rpi/logs
log_on_start = false
